name: Badge

on:
  schedule:
    - cron: "0 0 * * *"   # 每天运行一次（UTC 0点）
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ⭐ 关键：创建 dist 目录
      - name: Create dist folder
        run: mkdir -p dist

      # 🐍 Snake
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: liWanr
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      # 📊 Stats
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=liWanr&show_icons=true&locale=cn&hide_border=true&theme=transparent
          path: dist/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 📚 Language
      - name: Generate languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=liWanr&layout=compact&locale=cn&hide_border=true&theme=transparent
          path: dist/language.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 🔥 Streak
      - name: Download streak
        run: |
          curl -L "https://streak-stats.demolab.com?user=liWanr&theme=transparent&hide_border=true&locale=zh_Hans&short_numbers=true" \
          -o dist/streak.svg

      # 🚀 Push
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
